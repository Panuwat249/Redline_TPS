<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard รฟฟท.</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
<h1>ระดับการให้บริการระบบรถไฟฟ้าชานเมืองสายสีแดง</h1>
<a href="admin-login.html" class="admin-btn">ระบบหลังบ้าน</a>
</div>

<div class="container">

<h2 id="month"></h2>

<div class="card-grid">

<div class="card">
<h3>ความตรงต่อเวลา</h3>
<div class="number" id="punctuality"></div>
</div>

<div class="card">
<h3>ความน่าเชื่อถือ</h3>
<div class="number" id="reliability"></div>
</div>

<div class="card">
<h3>ความพร้อมขบวนรถ</h3>
<div class="number" id="readiness"></div>
</div>

<div class="card">
<h3>ระยะทางวิ่ง (กม.)</h3>
<div class="number" id="total_distance"></div>
</div>

<div class="card">
<h3>จำนวนเที่ยว</h3>
<div class="number" id="total_trip"></div>
</div>

<div class="card">
<h3>ยกเลิกเที่ยว</h3>
<div class="number" id="cancel_total"></div>
</div>

</div>

<div class="graph-box">
<img id="graph" src="graph.png">
</div>

</div>

<script src="script.js"></script>
</body>
</html>
