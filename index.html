<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Dashboard รถไฟฟ้าสายสีแดง
</title>

<link rel="stylesheet"
href="css/style.css">

<link
href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800;900&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header class="hero">

<div class="hero-content">

<h1>
ระดับการให้บริการ
ระบบรถไฟฟ้าชานเมืองสายสีแดง
</h1>

<p id="monthTitle"></p>

<select id="monthSelector"></select>

</div>

</header>

<section class="dashboard">

<div class="card red">

<h2>ความตรงต่อเวลา</h2>

<h1 id="ontime"></h1>

<div class="detail">

<div>
<span>สายเหนือ</span>
<p id="ontimeNorth"></p>
</div>

<div>
<span>สายตะวันตก</span>
<p id="ontimeWest"></p>
</div>

</div>

</div>

<div class="card blue">

<h2>ความพร้อมขบวนรถ</h2>

<h1 id="availability"></h1>

<div class="detail">

<div>
<span>สายเหนือ</span>
<p id="availabilityNorth"></p>
</div>

<div>
<span>สายตะวันตก</span>
<p id="availabilityWest"></p>
</div>

</div>

</div>

<div class="card green">

<h2>ความน่าเชื่อถือ</h2>

<h1 id="reliability"></h1>

<div class="detail">

<div>
<span>สายเหนือ</span>
<p id="reliabilityNorth"></p>
</div>

<div>
<span>สายตะวันตก</span>
<p id="reliabilityWest"></p>
</div>

</div>

</div>

<div class="card">

<h2>ระยะทางให้บริการ</h2>

<h1 id="distance"></h1>
<p>กิโลเมตร</p>

</div>

<div class="card">

<h2>จำนวนเที่ยวบริการ</h2>

<h1 id="trips"></h1>
<p>เที่ยว</p>

</div>

<div class="card">

<h2>ยกเลิกเที่ยววิ่ง</h2>

<h1 id="cancelled"></h1>
<p>เที่ยว</p>

</div>

</section>

<section class="chart-section">

<div class="chart-card">

<h2>
แนวโน้มความตรงต่อเวลา
</h2>

<canvas id="historyChart">
</canvas>

</div>

</section>

<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
